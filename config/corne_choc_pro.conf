# Enable mouse emulation.
CONFIG_ZMK_POINTING=y

# Mouse-key peak speed (default 600). MOVE_UP/DOWN/LEFT/RIGHT ramp from 0 to this
# value over `time-to-max-speed-ms` (set on &mmv in corne_choc_pro.dtsi).
CONFIG_ZMK_POINTING_DEFAULT_MOVE_VAL=1200

# Scroll-key speed (default 10). Higher = larger scroll per tick.
CONFIG_ZMK_POINTING_DEFAULT_SCRL_VAL=20

# Change idle settings
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
CONFIG_ZMK_KEYBOARD_NAME="Maxi corne"
