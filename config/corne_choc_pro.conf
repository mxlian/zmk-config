# Enable mouse emulation.
CONFIG_ZMK_POINTING=y

# Note: mouse-key peak speed and scroll speed are set via #defines in
# corne_choc_pro.keymap (ZMK_POINTING_DEFAULT_MOVE_VAL / _SCRL_VAL) — they
# are C macros in ZMK v0.3, not Kconfig symbols.

# Change idle settings
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
CONFIG_ZMK_KEYBOARD_NAME="Maxi corne"
